name: Terraform Infrastructure

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod

      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

      confirm_destroy:
        description: 'Type destroy to confirm destroy operation'
        required: false

env:
  TF_VERSION: 1.10.5
  AWS_REGION: us-east-1

concurrency:
  group: terraform-${{ github.ref }}-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────────────────────
  # Terraform Plan
  # ─────────────────────────────────────────────────────────────

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: [dev, qa, prod]

    defaults:
      run:
        working-directory: envs/${{ matrix.environment }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="db_password=${{ secrets[format('{0}_DB_PASSWORD', upper(matrix.environment))] }}" \
            -var="jwt_secret=${{ secrets[format('{0}_JWT_SECRET', upper(matrix.environment))] }}" \
            -var="github_org=Balasai234" \
            -out=tfplan \
            -no-color
        continue-on-error: true

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Release State Lock On Failure
        if: failure() || cancelled()
        run: |
          aws s3 rm s3://${{ vars.TF_STATE_BUCKET }}/envs/${{ matrix.environment }}/terraform.tfstate.tflock || true

      - name: Upload Plan File
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: envs/${{ matrix.environment }}/tfplan
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Terraform Apply
  # ─────────────────────────────────────────────────────────────

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'

    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: envs/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Download Plan File
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}
          path: envs/${{ github.event.inputs.environment }}

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            -no-color \
            tfplan

      - name: Release State Lock On Failure
        if: failure() || cancelled()
        run: |
          aws s3 rm s3://${{ vars.TF_STATE_BUCKET }}/envs/${{ github.event.inputs.environment }}/terraform.tfstate.tflock || true

  # ─────────────────────────────────────────────────────────────
  # Terraform Destroy
  # ─────────────────────────────────────────────────────────────

  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'destroy' &&
      github.event.inputs.confirm_destroy == 'destroy'

    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: envs/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var="db_password=${{ secrets[format('{0}_DB_PASSWORD', upper(github.event.inputs.environment))] }}" \
            -var="jwt_secret=${{ secrets[format('{0}_JWT_SECRET', upper(github.event.inputs.environment))] }}" \
            -var="github_org=Balasai234" \
            -auto-approve \
            -no-color

      - name: Release State Lock On Failure
        if: failure() || cancelled()
        run: |
          aws s3 rm s3://${{ vars.TF_STATE_BUCKET }}/envs/${{ github.event.inputs.environment }}/terraform.tfstate.tflock || true